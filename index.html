<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TranslationCall Pro</title>
<style>

/* ===== Base ===== */
*{margin:0;padding:0;box-sizing:border-box;}
body{
    font-family: 'Segoe UI', Arial, sans-serif;
    background:#0f172a;
    color:white;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* ===== Background ===== */
.bg{
    position:fixed;
    inset:0;
    z-index:0;
    overflow:hidden;
}
.bg-circle{
    position:absolute;
    border-radius:50%;
    filter:blur(80px);
    opacity:0.3;
}
.bg-circle-1{
    width:500px;height:500px;
    background:#6366f1;
    top:-200px;right:-200px;
    animation:float 15s ease-in-out infinite;
}
.bg-circle-2{
    width:400px;height:400px;
    background:#10b981;
    bottom:-150px;left:-150px;
    animation:float 20s ease-in-out infinite reverse;
}
@keyframes float{
    0%,100%{transform:translate(0,0);}
    50%{transform:translate(30px,-30px);}
}

/* ===== Header ===== */
header{
    position:relative;z-index:1;
    width:100%;
    padding:20px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(30,41,59,0.5);
    backdrop-filter:blur(20px);
    border-bottom:1px solid rgba(255,255,255,0.05);
}
.logo{
    display:flex;
    align-items:center;
    gap:12px;
}
.logo-icon{
    width:45px;height:45px;
    background:linear-gradient(135deg,#6366f1,#8b5cf6);
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
}
.logo-text{
    font-size:1.4rem;
    font-weight:700;
    background:linear-gradient(135deg,#6366f1,#10b981);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}
.logo-pro{
    font-size:0.7rem;
    color:#10b981;
    letter-spacing:2px;
    display:block;
}
.status{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:0.85rem;
    color:#94a3b8;
}
.status-dot{
    width:10px;height:10px;
    border-radius:50%;
    background:#ef4444;
}
.status-dot.on{
    background:#10b981;
    box-shadow:0 0 10px #10b981;
    animation:pulse 2s infinite;
}
@keyframes pulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.3);}
}

/* ===== Main ===== */
main{
    position:relative;z-index:1;
    width:100%;
    max-width:900px;
    padding:40px 20px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:30px;
}

/* ===== Hero ===== */
.hero{
    text-align:center;
}
.hero h1{
    font-size:2.8rem;
    font-weight:800;
    line-height:1.2;
    margin-bottom:15px;
}
.hero h1 span{
    background:linear-gradient(135deg,#6366f1,#10b981);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}
.hero p{
    color:#94a3b8;
    font-size:1.1rem;
    line-height:1.7;
}

/* ===== Card ===== */
.card{
    width:100%;
    background:rgba(30,41,59,0.8);
    backdrop-filter:blur(20px);
    border-radius:24px;
    padding:30px;
    border:1px solid rgba(255,255,255,0.05);
    box-shadow:0 8px 32px rgba(0,0,0,0.4);
}

/* ===== Language Selector ===== */
.lang-section{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:15px;
}
.lang-section label{
    color:#94a3b8;
    font-size:0.9rem;
}
.lang-buttons{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    justify-content:center;
}
.lang-btn{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:5px;
    padding:15px 25px;
    background:rgba(0,0,0,0.3);
    border:2px solid transparent;
    border-radius:16px;
    cursor:pointer;
    transition:all 0.3s;
    color:white;
    font-size:0.9rem;
}
.lang-btn:hover{
    border-color:rgba(99,102,241,0.5);
    transform:translateY(-3px);
}
.lang-btn.active{
    border-color:#6366f1;
    background:rgba(99,102,241,0.15);
    box-shadow:0 0 20px rgba(99,102,241,0.3);
}
.lang-btn .flag{font-size:2rem;}
.lang-btn .name{font-size:0.8rem;color:#94a3b8;}

/* ===== Controls ===== */
.controls{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:20px;
}
.mic-btn{
    width:90px;height:90px;
    border-radius:50%;
    border:none;
    background:linear-gradient(135deg,#6366f1,#8b5cf6);
    color:white;
    font-size:2.5rem;
    cursor:pointer;
    transition:all 0.3s;
    box-shadow:0 0 30px rgba(99,102,241,0.4);
    display:flex;
    align-items:center;
    justify-content:center;
}
.mic-btn:hover{
    transform:scale(1.1);
    box-shadow:0 0 50px rgba(99,102,241,0.6);
}
.mic-btn.recording{
    background:linear-gradient(135deg,#ef4444,#f97316);
    box-shadow:0 0 30px rgba(239,68,68,0.5);
    animation:recording 1s infinite;
}
@keyframes recording{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.08);}
}
.mic-label{
    color:#94a3b8;
    font-size:0.9rem;
}

/* ===== Visualizer ===== */
.visualizer{
    display:flex;
    align-items:center;
    gap:4px;
    height:40px;
    opacity:0;
    transition:opacity 0.3s;
}
.visualizer.active{opacity:1;}
.bar{
    width:4px;
    height:10px;
    background:linear-gradient(#6366f1,#10b981);
    border-radius:2px;
    animation:wave 0.5s ease-in-out infinite;
}
.bar:nth-child(2){animation-delay:0.1s;}
.bar:nth-child(3){animation-delay:0.2s;}
.bar:nth-child(4){animation-delay:0.3s;}
.bar:nth-child(5){animation-delay:0.4s;}
@keyframes wave{
    0%,100%{height:10px;}
    50%{height:40px;}
}

/* ===== Results ===== */
.results{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}
@media(max-width:600px){
    .results{grid-template-columns:1fr;}
    .hero h1{font-size:2rem;}
}
.result-box{
    background:rgba(0,0,0,0.3);
    border-radius:16px;
    padding:20px;
    min-height:100px;
    border:1px solid rgba(255,255,255,0.05);
    transition:all 0.3s;
}
.result-box.has-content{
    border-color:rgba(99,102,241,0.3);
}
.result-box h4{
    font-size:0.8rem;
    color:#64748b;
    margin-bottom:10px;
    text-transform:uppercase;
    letter-spacing:1px;
}
.result-box p{
    font-size:1.1rem;
    line-height:1.6;
    color:#f1f5f9;
    min-height:40px;
}
.original-box h4{color:#6366f1;}
.translated-box h4{color:#10b981;}
.translated-box p{color:#10b981;}

/* ===== History ===== */
.history-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}
.history-header h3{
    font-size:1rem;
    color:#94a3b8;
}
.clear-btn{
    padding:6px 14px;
    background:rgba(239,68,68,0.15);
    border:1px solid rgba(239,68,68,0.3);
    border-radius:8px;
    color:#ef4444;
    cursor:pointer;
    font-size:0.8rem;
    transition:all 0.3s;
}
.clear-btn:hover{background:rgba(239,68,68,0.3);}
.history-list{
    display:flex;
    flex-direction:column;
    gap:12px;
    max-height:300px;
    overflow-y:auto;
}
.history-item{
    background:rgba(0,0,0,0.3);
    border-radius:12px;
    padding:15px;
    border-left:3px solid #6366f1;
    animation:slideIn 0.3s ease;
}
@keyframes slideIn{
    from{opacity:0;transform:translateY(10px);}
    to{opacity:1;transform:translateY(0);}
}
.history-item .time{
    font-size:0.7rem;
    color:#64748b;
    margin-bottom:8px;
}
.history-item .original{
    color:#f1f5f9;
    margin-bottom:5px;
}
.history-item .translated{
    color:#10b981;
    font-size:0.95rem;
}
.history-item .langs{
    font-size:0.75rem;
    color:#64748b;
    margin-bottom:5px;
}

/* ===== Scrollbar ===== */
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:rgba(0,0,0,0.2);}
::-webkit-scrollbar-thumb{background:rgba(99,102,241,0.5);border-radius:3px;}

/* ===== Footer ===== */
footer{
    position:relative;z-index:1;
    padding:20px;
    color:#475569;
    font-size:0.8rem;
    text-align:center;
    border-top:1px solid rgba(255,255,255,0.03);
    width:100%;
}

/* ===== Speaking Indicator ===== */
.speaking-badge{
    display:none;
    align-items:center;
    gap:8px;
    padding:8px 16px;
    background:rgba(16,185,129,0.15);
    border:1px solid rgba(16,185,129,0.3);
    border-radius:20px;
    color:#10b981;
    font-size:0.85rem;
}
.speaking-badge.show{display:flex;}

</style>
</head>

<body>

<!-- Background -->
<div class="bg">
    <div class="bg-circle bg-circle-1"></div>
    <div class="bg-circle bg-circle-2"></div>
</div>

<!-- Header -->
<header>
    <div class="logo">
        <div class="logo-icon">🌐</div>
        <div>
            <div class="logo-text">TranslationCall</div>
            <span class="logo-pro">PRO</span>
        </div>
    </div>
    <div class="status">
        <div class="status-dot on" id="statusDot"></div>
        <span id="statusText">جاهز</span>
    </div>
</header>

<!-- Main -->
<main>
    <!-- Hero -->
    <div class="hero">
        <h1>محادثة بلا <span>حواجز اللغة</span></h1>
        <p>تحدث بلغتك وسيترجم التطبيق ما تقوله فوراً 🔥</p>
    </div>

    <!-- Language Card -->
    <div class="card">
        <div class="lang-section">
            <label>🌍 اختر لغتك</label>
            <div class="lang-buttons">
                <button class="lang-btn active" onclick="setLang('ar','ar-SA',this)">
                    <span class="flag">🇸🇦</span>
                    <span class="name">العربية</span>
                </button>
                <button class="lang-btn" onclick="setLang('en','en-US',this)">
                    <span class="flag">🇺🇸</span>
                    <span class="name">English</span>
                </button>
                <button class="lang-btn" onclick="setLang('es','es-ES',this)">
                    <span class="flag">🇪🇸</span>
                    <span class="name">Español</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Controls Card -->
    <div class="card">
        <div class="controls">
            <button class="mic-btn" id="micBtn" onclick="toggleRecording()">
                🎤
            </button>
            <div class="mic-label" id="micLabel">اضغط للتحدث</div>

            <!-- Visualizer -->
            <div class="visualizer" id="visualizer">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>

            <!-- Speaking Badge -->
            <div class="speaking-badge" id="speakingBadge">
                🔊 <span>جاري النطق بالترجمة...</span>
            </div>
        </div>
    </div>

    <!-- Results Card -->
    <div class="card">
        <div class="results">
            <div class="result-box original-box" id="originalBox">
                <h4>🎤 النص الأصلي</h4>
                <p id="originalText">سيظهر هنا ما تقوله...</p>
            </div>
            <div class="result-box translated-box" id="translatedBox">
                <h4>🌐 الترجمة</h4>
                <p id="translatedText">سيظهر هنا النص المترجم...</p>
            </div>
        </div>
    </div>

    <!-- History Card -->
    <div class="card">
        <div class="history-header">
            <h3>📋 سجل المحادثة</h3>
            <button class="clear-btn" onclick="clearHistory()">مسح الكل</button>
        </div>
        <div class="history-list" id="historyList">
            <p style="color:#475569;text-align:center;font-size:0.9rem;">
                لا يوجد سجل بعد. ابدأ بالتحدث!
            </p>
        </div>
    </div>
</main>

<!-- Footer -->
<footer>
    TranslationCall Pro © 2024 | صنع بـ ❤️
</footer>

<script>
// ============================================
// Variables
// ============================================
let recognition;
let isRecording = false;
let selectedLang = 'ar';
let selectedVoiceLang = 'ar-SA';
let history = [];

// ============================================
// Set Language
// ============================================
function setLang(lang, voiceLang, btn){
    selectedLang = lang;
    selectedVoiceLang = voiceLang;

    // Update active button
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

// ============================================
// Toggle Recording
// ============================================
function toggleRecording(){
    if(isRecording){
        stopRecording();
    } else {
        startRecording();
    }
}

// ============================================
// Start Recording
// ============================================
function startRecording(){
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if(!SpeechRecognition){
        alert('متصفحك لا يدعم هذه الميزة. استخدم Chrome أو Edge');
        return;
    }

    recognition = new SpeechRecognition();
    recognition.lang = selectedVoiceLang;
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = function(){
        isRecording = true;
        document.getElementById('micBtn').classList.add('recording');
        document.getElementById('micBtn').innerText = '⏹️';
        document.getElementById('micLabel').innerText = 'جاري الاستماع...';
        document.getElementById('visualizer').classList.add('active');
        document.getElementById('statusText').innerText = 'يستمع...';
    };

    recognition.onresult = function(event){
        let text = event.results[0][0].transcript;
        document.getElementById('originalText').innerText = text;
        document.getElementById('originalBox').classList.add('has-content');
        translateText(text);
    };

    recognition.onerror = function(event){
        console.error('Error:', event.error);
        stopRecording();
        if(event.error === 'not-allowed'){
            alert('يرجى السماح بالوصول للميكروفون');
        }
    };

    recognition.onend = function(){
        stopRecording();
    };

    recognition.start();
}

// ============================================
// Stop Recording
// ============================================
function stopRecording(){
    isRecording = false;
    if(recognition) recognition.stop();
    document.getElementById('micBtn').classList.remove('recording');
    document.getElementById('micBtn').innerText = '🎤';
    document.getElementById('micLabel').innerText = 'اضغط للتحدث';
    document.getElementById('visualizer').classList.remove('active');
    document.getElementById('statusText').innerText = 'جاهز';
}

// ============================================
// Translate Text
// ============================================
async function translateText(text){
    // تحديد لغة الترجمة المستهدفة
    let targetLang;
    if(selectedLang === 'ar'){
        targetLang = 'en';
    } else if(selectedLang === 'en'){
        targetLang = 'ar';
    } else if(selectedLang === 'es'){
        targetLang = 'ar';
    }

    document.getElementById('statusText').innerText = 'يترجم...';

    try {
        let response = await fetch(
            `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${selectedLang}&tl=${targetLang}&dt=t&q=${encodeURIComponent(text)}`
        );

        let data = await response.json();
        let translatedText = data[0][0][0];

        document.getElementById('translatedText').innerText = translatedText;
        document.getElementById('translatedBox').classList.add('has-content');

        // Speak translation
        speak(translatedText, targetLang);

        // Save to history
        saveHistory(text, translatedText, selectedLang, targetLang);

        document.getElementById('statusText').innerText = 'تمت الترجمة ✅';

        setTimeout(() => {
            document.getElementById('statusText').innerText = 'جاهز';
        }, 3000);

    } catch(error){
        console.error('Translation error:', error);
        document.getElementById('statusText').innerText = 'خطأ في الترجمة ❌';
    }
}

// ============================================
// Speak Text (Fixed & Improved)
// ============================================
function speak(text, lang){
    // Cancel any ongoing speech
    window.speechSynthesis.cancel();

    // Wait a moment then speak
    setTimeout(() => {
        let utterance = new SpeechSynthesisUtterance(text);

        // Set language
        if(lang === 'ar'){
            utterance.lang = 'ar-SA';
        } else if(lang === 'en'){
            utterance.lang = 'en-US';
        } else if(lang === 'es'){
            utterance.lang = 'es-ES';
        }

        utterance.rate = 0.9;
        utterance.pitch = 1;
        utterance.volume = 1;

        // Try to find best voice
        let voices = window.speechSynthesis.getVoices();
        let bestVoice = voices.find(v => v.lang.startsWith(lang));
        if(bestVoice){
            utterance.voice = bestVoice;
        }

        // Show speaking badge
        utterance.onstart = () => {
            document.getElementById('speakingBadge').classList.add('show');
        };

        utterance.onend = () => {
            document.getElementById('speakingBadge').classList.remove('show');
        };

        window.speechSynthesis.speak(utterance);
    }, 300);
}

// ============================================
// Save History
// ============================================
function saveHistory(original, translated, fromLang, toLang){
    let langNames = {
        'ar': '🇸🇦 العربية',
        'en': '🇺🇸 English',
        'es': '🇪🇸 Español'
    };

    let item = {
        original,
        translated,
        from: langNames[fromLang] || fromLang,
        to: langNames[toLang] || toLang,
        time: new Date().toLocaleTimeString()
    };

    history.unshift(item);

    renderHistory();
}

// ============================================
// Render History
// ============================================
function renderHistory(){
    let list = document.getElementById('historyList');

    if(history.length === 0){
        list.innerHTML = '<p style="color:#475569;text-align:center;font-size:0.9rem;">لا يوجد سجل بعد. ابدأ بالتحدث!</p>';
        return;
    }

    list.innerHTML = history.map(item => `
        <div class="history-item">
            <div class="time">🕐 ${item.time}</div>
            <div class="langs">${item.from} → ${item.to}</div>
            <div class="original">🎤 ${item.original}</div>
            <div class="translated">🌐 ${item.translated}</div>
        </div>
    `).join('');
}

// ============================================
// Clear History
// ============================================
function clearHistory(){
    history = [];
    renderHistory();
}

// ============================================
// Load Voices on Start
// ============================================
window.speechSynthesis.onvoiceschanged = function(){
    window.speechSynthesis.getVoices();
};

// Load voices immediately
window.onload = function(){
    window.speechSynthesis.getVoices();
};
</script>

</body>
</html>
