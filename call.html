<script>
var SERVER_URL = 'YOUR_SERVER_URL';

var langs = {
  ar:{name:'العربية',flag:'🇸🇦',voice:'ar-SA'},
  en:{name:'English',flag:'🇺🇸',voice:'en-US'},
  es:{name:'Español',flag:'🇪🇸',voice:'es-ES'},
  fr:{name:'Français',flag:'🇫🇷',voice:'fr-FR'},
  de:{name:'Deutsch',flag:'🇩🇪',voice:'de-DE'},
  tr:{name:'Türkçe',flag:'🇹🇷',voice:'tr-TR'},
  zh:{name:'中文',flag:'🇨🇳',voice:'zh-CN'},
  ja:{name:'日本語',flag:'🇯🇵',voice:'ja-JP'},
  ru:{name:'Русский',flag:'🇷🇺',voice:'ru-RU'},
  pt:{name:'Português',flag:'🇧🇷',voice:'pt-BR'}
};

// State
var socket=null,roomId=null,myName='',myLang='ar';
var partnerInfo=null,partnerLang='en';
var localStream=null,peerConnection=null;
var isCameraOn=true,isAudioOn=true,isMicOn=true,isSpeakerOn=true,isFrontCamera=true;
var previewStream=null,isPreviewMicOn=true,isPreviewCamOn=true;
var recognition=null,isRecording=false,translationCount=0;
var timerInterval=null,callSeconds=0;
var subtitleMode='both',subtitleFontSize=16,subtitlePos='bottom';
var audioActivated=false;
var speechSettings={rate:0.88,pitch:1,volume:1};

// ✅ RTC Config مع أكثر STUN servers
var RTC_CONFIG={
  iceServers:[
    {urls:'stun:stun.l.google.com:19302'},
    {urls:'stun:stun1.l.google.com:19302'},
    {urls:'stun:stun2.l.google.com:19302'},
    {urls:'stun:stun3.l.google.com:19302'},
    {urls:'stun:stun4.l.google.com:19302'},
    {urls:'stun:stun.cloudflare.com:3478'},
    {urls:'stun:stun.services.mozilla.com'}
  ],
  iceCandidatePoolSize:10
};

// ============================================
// Audio
// ============================================
function activateAudio(){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    ctx.resume();
    window.speechSynthesis.cancel();
    var u=new SpeechSynthesisUtterance(' ');
    u.volume=0.01;u.rate=10;
    window.speechSynthesis.speak(u);
    audioActivated=true;
    document.getElementById('iosBtn').classList.remove('show');
    showNotif('تم تفعيل الصوت ✅','success');
  }catch(e){console.log('Audio error:',e);}
}

function showIOSBtn(){
  var isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
  var isMac=navigator.maxTouchPoints>0&&/Mac/.test(navigator.userAgent);
  if(isIOS||isMac){
    document.getElementById('iosBtn').classList.add('show');
    setTimeout(function(){document.getElementById('iosBtn').classList.remove('show');},15000);
  }
}

function getClientId(){
  var id=localStorage.getItem('tcClientId');
  if(!id){id='c_'+Math.random().toString(36).substr(2,9);localStorage.setItem('tcClientId',id);}
  return id;
}

// ============================================
// Socket
// ============================================
function initSocket(){
  socket=io(SERVER_URL,{transports:['websocket','polling'],reconnection:true,reconnectionAttempts:20,reconnectionDelay:1000});

  socket.on('connect',function(){
    console.log('✅ Socket connected:',socket.id);
    checkAccess();
  });

  socket.on('disconnect',function(){
    showNotif('انقطع الاتصال... جاري إعادة الاتصال','warning');
  });

  socket.on('partner-joined',function(data){
    console.log('✅ Partner joined:',data);
    partnerInfo=data;
    partnerLang=data.language;
    updatePartnerUI(data);
    hideWaiting();
    startTimer();
    isMicOn=true;
    startTranslation();
    document.getElementById('qualityBadge').style.display='flex';
    showNotif(data.name+' انضم! 🎉','success');
    showIOSBtn();
    // ✅ المضيف يبدأ الاتصال
    setTimeout(function(){startPeerConnection(true);},800);
  });

  socket.on('partner-reconnected',function(data){
    showNotif(data.name+' عاد ✅','success');
  });

  socket.on('partner-connection-unstable',function(){
    showNotif('شريكك يعيد الاتصال...','warning');
  });

  socket.on('partner-left',function(data){
    partnerInfo=null;
    showWaiting();
    stopTimer();
    stopTranslation();
    stopPeerConnection();
    document.getElementById('qualityBadge').style.display='none';
    showNotif((data.name||'الشريك')+' غادر المكالمة','error');
    resetPartnerUI();
  });

  socket.on('new-message',function(msg){
    if(msg.senderId!==socket.id){
      // ✅ فقط subtitle - بدون صوت AI
      showPartnerSubtitle(msg.originalText,msg.translatedText,msg.senderLanguage,msg.targetLanguage);
      translationCount++;
    }
  });

  socket.on('partner-speaking',function(data){
    var ind=document.getElementById('speakingIndicator');
    var name=document.getElementById('speakingName');
    if(data.speaking&&partnerInfo){
      name.innerText=partnerInfo.name+' يتحدث';
      ind.classList.add('show');
    }else{
      ind.classList.remove('show');
    }
  });

  socket.on('partner-interim-speech',function(data){
    if(data.text&&data.text.trim()&&partnerInfo){
      document.getElementById('partnerOriginalText').innerText=data.text;
      document.getElementById('partnerSubtitleBox').style.display='block';
    }else{
      document.getElementById('partnerSubtitleBox').style.display='none';
    }
  });

  // ✅ WebRTC Signaling
  socket.on('rtc-offer',function(data){
    console.log('📥 Received offer');
    handleOffer(data.offer);
  });

  socket.on('rtc-answer',function(data){
    console.log('📥 Received answer');
    handleAnswer(data.answer);
  });

  socket.on('rtc-ice',function(data){
    handleIce(data.candidate);
  });

  socket.on('partner-camera-toggle',function(data){
    var rv=document.getElementById('remoteVideo');
    var rp=document.getElementById('remotePlaceholder');
    rv.style.display=data.enabled?'block':'none';
    rp.style.display=data.enabled?'none':'flex';
  });

  socket.on('blocked',function(){alert('تم حظرك');window.location.href='index.html';});
  socket.on('maintenance',function(){alert('الموقع في صيانة');window.location.href='index.html';});
  socket.on('room-deleted',function(){showNotif('تم حذف المكالمة','error');setTimeout(function(){endCall();},2000);});
  socket.on('admin-warning',function(data){showNotif('⚠️ '+data.message,'error');});
}

// ============================================
// Gate
// ============================================
function verifyGate(){
  var code=document.getElementById('gateInput').value.trim();
  var errorEl=document.getElementById('gateError');
  var errorText=document.getElementById('gateErrorText');
  if(!code){errorEl.style.display='block';errorText.innerText='يرجى إدخال الكود';return;}
  if(!socket||!socket.connected){errorEl.style.display='block';errorText.innerText='جاري الاتصال... حاول مرة أخرى';return;}
  socket.emit('verify-site-code',{code:code},function(res){
    if(res.success){
      localStorage.setItem('tcAccess','ok');
      document.getElementById('gate').style.display='none';
      initPreCall();
    }else{
      errorEl.style.display='block';
      errorText.innerText='الكود غير صحيح ❌';
      document.getElementById('gateInput').value='';
    }
  });
}

function checkAccess(){
  var params=new URLSearchParams(window.location.search);
  if(params.get('join')){
    document.getElementById('gate').style.display='none';
    initPreCall();
    return;
  }
  if(localStorage.getItem('tcAccess')==='ok'){
    document.getElementById('gate').style.display='none';
    initPreCall();
  }
}

// ============================================
// Pre-Call
// ============================================
function initPreCall(){
  document.getElementById('preCall').classList.add('active');
  checkAutoJoin();
  startPreview();
}

function startPreview(){
  navigator.mediaDevices.getUserMedia({video:true,audio:true})
    .then(function(stream){
      previewStream=stream;
      document.getElementById('previewVideo').srcObject=stream;
      document.getElementById('previewOff').style.display='none';
    })
    .catch(function(e){
      console.log('Preview error:',e);
      document.getElementById('previewOff').style.display='flex';
    });
}

function togglePreviewMic(){
  isPreviewMicOn=!isPreviewMicOn;
  if(previewStream) previewStream.getAudioTracks().forEach(function(t){t.enabled=isPreviewMicOn;});
  var btn=document.getElementById('previewMicBtn');
  var icon=document.getElementById('previewMicIcon');
  btn.classList.toggle('off',!isPreviewMicOn);
  icon.className=isPreviewMicOn?'fas fa-microphone':'fas fa-microphone-slash';
}

function togglePreviewCam(){
  isPreviewCamOn=!isPreviewCamOn;
  if(previewStream) previewStream.getVideoTracks().forEach(function(t){t.enabled=isPreviewCamOn;});
  var btn=document.getElementById('previewCamBtn');
  var icon=document.getElementById('previewCamIcon');
  btn.classList.toggle('off',!isPreviewCamOn);
  icon.className=isPreviewCamOn?'fas fa-video':'fas fa-video-slash';
  document.getElementById('previewOff').style.display=isPreviewCamOn?'none':'flex';
}

function showJoinInput(){
  var group=document.getElementById('joinCodeGroup');
  var btn=document.getElementById('joinCallBtn');
  var isHidden=group.style.display==='none';
  group.style.display=isHidden?'block':'none';
  btn.style.display=isHidden?'block':'none';
}

// ============================================
// Create / Join
// ============================================
function createCall(){
  var name=document.getElementById('callName').value.trim();
  var lang=document.getElementById('callLang').value;
  if(!name){showNotif('يرجى إدخال اسمك','error');return;}
  myName=name;myLang=lang;
  socket.emit('create-room',{userName:name,language:lang,isPrivate:false,password:null,clientId:getClientId()},function(res){
    if(res.success){
      roomId=res.roomId;
      saveSession();
      enterCallScreen(true);
    }else{showNotif(res.error||'حدث خطأ','error');}
  });
}

function joinCall(){
  var name=document.getElementById('callName').value.trim();
  var lang=document.getElementById('callLang').value;
  var code=document.getElementById('callCode').value.trim().toUpperCase();
  if(!name){showNotif('يرجى إدخال اسمك','error');return;}
  if(!code||code.length!==6){showNotif('يرجى إدخال رمز المكالمة','error');return;}
  myName=name;myLang=lang;
  socket.emit('join-room',{roomId:code,userName:name,language:lang,password:'',clientId:getClientId()},function(res){
    if(res.success){
      roomId=res.roomId;
      if(res.partner){partnerInfo=res.partner;partnerLang=res.partner.language;}
      saveSession();
      enterCallScreen(false);
      if(res.partner){
        updatePartnerUI(res.partner);
        hideWaiting();
        startTimer();
        isMicOn=true;
        startTranslation();
        showIOSBtn();
        // ✅ الشريك الذي ينضم يبدأ الاتصال أيضاً
        setTimeout(function(){startPeerConnection(false);},800);
      }
    }else{showNotif(res.error||'حدث خطأ','error');}
  });
}

function saveSession(){
  localStorage.setItem('tcSession',JSON.stringify({roomId:roomId,myName:myName,myLang:myLang,timestamp:Date.now()}));
}

// ============================================
// Enter Call Screen
// ============================================
function enterCallScreen(isHost){
  if(previewStream){previewStream.getTracks().forEach(function(t){t.stop();});previewStream=null;}
  document.getElementById('preCall').classList.remove('active');
  document.getElementById('callScreen').classList.add('active');
  document.getElementById('waitingCode').innerText=roomId;
  document.getElementById('myAvatarWait').innerText=myName.charAt(0).toUpperCase();

  // ✅ احصل على الكاميرا والميكروفون
  getLocalMedia(function(){
    if(isHost) showWaiting();
  });
}

// ============================================
// ✅ Get Local Media
// ============================================
function getLocalMedia(callback){
  var constraints={
    video:{facingMode:isFrontCamera?'user':'environment',width:{ideal:1280},height:{ideal:720}},
    audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}
  };

  navigator.mediaDevices.getUserMedia(constraints)
    .then(function(stream){
      localStream=stream;
      var lv=document.getElementById('localVideo');
      lv.srcObject=stream;
      lv.style.display='block';
      document.getElementById('localPlaceholder').style.display='none';
      console.log('✅ Local media ready');
      if(callback) callback();
    })
    .catch(function(e){
      console.error('Media error:',e);
      showNotif('تعذر الوصول للكاميرا، سيتم الاتصال بالصوت فقط','warning');
      // Try audio only
      navigator.mediaDevices.getUserMedia({audio:true})
        .then(function(stream){
          localStream=stream;
          console.log('✅ Audio only ready');
          if(callback) callback();
        })
        .catch(function(e2){
          console.error('Audio error:',e2);
          showNotif('تعذر الوصول للميكروفون','error');
          if(callback) callback();
        });
    });
}

// ============================================
// ✅ WebRTC - Simple & Reliable
// ============================================
function startPeerConnection(isInitiator){
  console.log('🔗 Starting peer connection, isInitiator:',isInitiator);

  // Clean up old connection
  if(peerConnection){
    try{peerConnection.close();}catch(e){}
    peerConnection=null;
  }

  // Create new connection
  peerConnection=new RTCPeerConnection(RTC_CONFIG);
  console.log('✅ PeerConnection created');

  // Add local tracks
  if(localStream){
    localStream.getTracks().forEach(function(track){
      peerConnection.addTrack(track,localStream);
      console.log('✅ Added track:',track.kind);
    });
  }

  // Handle remote tracks
  peerConnection.ontrack=function(event){
    console.log('📥 Remote track received:',event.track.kind);
    var remoteVideo=document.getElementById('remoteVideo');
    if(event.streams&&event.streams[0]){
      remoteVideo.srcObject=event.streams[0];
      remoteVideo.play().catch(function(e){console.log('Remote video play error:',e);});
    }
    remoteVideo.style.display='block';
    document.getElementById('remotePlaceholder').style.display='none';
    document.getElementById('qualityBadge').style.display='flex';
  };

  // ICE candidates
  peerConnection.onicecandidate=function(event){
    if(event.candidate){
      socket.emit('rtc-ice',{roomId:roomId,candidate:event.candidate});
    }
  };

  // Connection state
  peerConnection.oniceconnectionstatechange=function(){
    if(!peerConnection) return;
    var state=peerConnection.iceConnectionState;
    console.log('ICE state:',state);
    if(state==='connected'||state==='completed'){
      showNotif('✅ اتصال الفيديو ممتاز!','success');
    }else if(state==='failed'){
      showNotif('⚠️ مشكلة في الاتصال','warning');
      try{peerConnection.restartIce();}catch(e){}
    }
  };

  peerConnection.onconnectionstatechange=function(){
    if(!peerConnection) return;
    console.log('Connection state:',peerConnection.connectionState);
  };

  // ✅ إذا كان المبادر، أنشئ offer
  if(isInitiator){
    setTimeout(function(){createOffer();},500);
  }
}

async function createOffer(){
  try{
    if(!peerConnection) return;
    console.log('📤 Creating offer...');
    var offer=await peerConnection.createOffer({
      offerToReceiveAudio:true,
      offerToReceiveVideo:true
    });
    await peerConnection.setLocalDescription(offer);
    socket.emit('rtc-offer',{roomId:roomId,offer:offer});
    console.log('📤 Offer sent');
  }catch(e){console.error('Create offer error:',e);}
}

async function handleOffer(offer){
  try{
    console.log('📥 Handling offer...');
    if(!peerConnection){
      console.log('No peer connection, creating one...');
      startPeerConnection(false);
      await new Promise(function(r){setTimeout(r,300);});
    }
    await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
    var answer=await peerConnection.createAnswer();
    await peerConnection.setLocalDescription(answer);
    socket.emit('rtc-answer',{roomId:roomId,answer:answer});
    console.log('📤 Answer sent');
  }catch(e){console.error('Handle offer error:',e);}
}

async function handleAnswer(answer){
  try{
    if(!peerConnection){console.log('No peer connection for answer');return;}
    if(peerConnection.signalingState==='stable'){console.log('Already stable');return;}
    await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
    console.log('✅ Answer set successfully');
  }catch(e){console.error('Handle answer error:',e);}
}

async function handleIce(candidate){
  try{
    if(peerConnection&&candidate){
      await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
    }
  }catch(e){console.error('ICE error:',e);}
}

function stopPeerConnection(){
  if(peerConnection){try{peerConnection.close();}catch(e){}peerConnection=null;}
  var rv=document.getElementById('remoteVideo');
  rv.srcObject=null;rv.style.display='none';
  document.getElementById('remotePlaceholder').style.display='flex';
  document.getElementById('qualityBadge').style.display='none';
}

// ============================================
// ✅ Translation
// ============================================
function startTranslation(){
  if(isRecording||!isMicOn) return;
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){showNotif('متصفحك لا يدعم التعرف على الصوت','error');return;}

  recognition=new SR();
  recognition.lang=langs[myLang]?langs[myLang].voice:'ar-SA';
  recognition.continuous=false;
  recognition.interimResults=true;

  recognition.onstart=function(){
    isRecording=true;
    document.getElementById('speakingName').innerText='أنت تتحدث';
    document.getElementById('speakingIndicator').classList.add('show');
    socket.emit('speaking',{roomId:roomId,speaking:true});
  };

  recognition.onresult=function(e){
    var interim='',final='';
    for(var i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal) final+=e.results[i][0].transcript;
      else interim+=e.results[i][0].transcript;
    }
    if(interim){
      showMySubtitle(interim,'',myLang,partnerLang,true);
      socket.emit('interim-speech',{roomId:roomId,text:interim});
    }
    if(final.trim()){
      translateAndSend(final.trim());
      socket.emit('interim-speech',{roomId:roomId,text:''});
    }
  };

  recognition.onerror=function(e){
    if(e.error==='not-allowed') showNotif('يرجى السماح بالميكروفون','error');
    isRecording=false;
  };

  recognition.onend=function(){
    document.getElementById('speakingIndicator').classList.remove('show');
    socket.emit('speaking',{roomId:roomId,speaking:false});
    isRecording=false;
    if(isMicOn&&partnerInfo){
      setTimeout(function(){
        if(isMicOn&&partnerInfo&&!isRecording) startTranslation();
      },300);
    }
  };

  try{recognition.start();}catch(e){isRecording=false;}
}

function stopTranslation(){
  isRecording=false;
  if(recognition){try{recognition.stop();}catch(e){}}
  document.getElementById('speakingIndicator').classList.remove('show');
  if(socket&&roomId) socket.emit('speaking',{roomId:roomId,speaking:false});
}

async function translateAndSend(text){
  if(!text||!partnerInfo) return;
  var tLang=partnerInfo.language;
  try{
    var url='https://translate.googleapis.com/translate_a/single?client=gtx&sl='+myLang+'&tl='+tLang+'&dt=t&q='+encodeURIComponent(text);
    var res=await fetch(url);
    var data=await res.json();
    var translated='';
    if(data&&data[0]) data[0].forEach(function(item){if(item&&item[0])translated+=item[0];});
    if(translated){
      showMySubtitle(text,translated,myLang,tLang,false);
      socket.emit('voice-message',{
        roomId:roomId,originalText:text,translatedText:translated,
        senderName:myName,senderLanguage:myLang,targetLanguage:tLang
      });
      translationCount++;
    }
  }catch(e){console.error('Translation error:',e);}
}

// ============================================
// Subtitle Display
// ============================================
function showMySubtitle(original,translated,fromLang,toLang,isInterim){
  var box=document.getElementById('mySubtitleBox');
  var origEl=document.getElementById('myOriginalText');
  var transEl=document.getElementById('myTranslatedText');
  if(subtitleMode==='none'){box.style.display='none';return;}
  box.style.display='block';
  box.style.opacity=isInterim?'0.7':'1';
  var ff=langs[fromLang]?langs[fromLang].flag:'';
  var tf=langs[toLang]?langs[toLang].flag:'';
  if(subtitleMode==='original'||subtitleMode==='both'){
    origEl.innerHTML=ff+' '+original;
    origEl.style.fontSize=subtitleFontSize+'px';
    origEl.style.display='block';
  }else{origEl.style.display='none';}
  if((subtitleMode==='translated'||subtitleMode==='both')&&translated){
    transEl.innerHTML=tf+' '+translated;
    transEl.style.fontSize=subtitleFontSize+'px';
    transEl.style.display='block';
  }else{transEl.style.display='none';}
  if(!isInterim){
    clearTimeout(box._t);
    box._t=setTimeout(function(){
      box.style.opacity='0';
      setTimeout(function(){box.style.display='none';box.style.opacity='1';},300);
    },5000);
  }
}

function showPartnerSubtitle(original,translated,fromLang,toLang){
  var box=document.getElementById('partnerSubtitleBox');
  var origEl=document.getElementById('partnerOriginalText');
  var transEl=document.getElementById('partnerTranslatedText');
  var label=document.getElementById('partnerSubtitleLabel');
  if(subtitleMode==='none'){box.style.display='none';return;}
  box.style.display='block';
  label.innerText=partnerInfo?partnerInfo.name:'شريكك';
  var ff=langs[fromLang]?langs[fromLang].flag:'';
  var tf=langs[toLang]?langs[toLang].flag:'';
  if(subtitleMode==='original'||subtitleMode==='both'){
    origEl.innerHTML=ff+' '+original;
    origEl.style.fontSize=subtitleFontSize+'px';
    origEl.style.display='block';
  }else{origEl.style.display='none';}
  if(subtitleMode==='translated'||subtitleMode==='both'){
    transEl.innerHTML=tf+' '+translated;
    transEl.style.fontSize=subtitleFontSize+'px';
    transEl.style.display='block';
  }else{transEl.style.display='none';}
  clearTimeout(box._t);
  box._t=setTimeout(function(){
    box.style.opacity='0';
    setTimeout(function(){box.style.display='none';box.style.opacity='1';},300);
  },5000);
}

// ============================================
// Controls
// ============================================
function toggleAudio(){
  isAudioOn=!isAudioOn;
  if(localStream) localStream.getAudioTracks().forEach(function(t){t.enabled=isAudioOn;});
  document.getElementById('muteBtn').classList.toggle('off',!isAudioOn);
  document.getElementById('muteIcon').className=isAudioOn?'fas fa-microphone':'fas fa-microphone-slash';
  if(socket&&roomId) socket.emit('partner-audio-toggle',{roomId:roomId,enabled:isAudioOn});
  showNotif(isAudioOn?'تم تشغيل الصوت 🎤':'تم كتم الصوت 🔇','info');
}

function toggleCamera(){
  isCameraOn=!isCameraOn;
  if(localStream) localStream.getVideoTracks().forEach(function(t){t.enabled=isCameraOn;});
  document.getElementById('camBtn').classList.toggle('off',!isCameraOn);
  document.getElementById('camIcon').className=isCameraOn?'fas fa-video':'fas fa-video-slash';
  document.getElementById('localFloat').classList.toggle('camera-off',!isCameraOn);
  document.getElementById('localPlaceholder').style.display=isCameraOn?'none':'flex';
  if(socket&&roomId) socket.emit('partner-camera-toggle',{roomId:roomId,enabled:isCameraOn});
  showNotif(isCameraOn?'تم تشغيل الكاميرا 📷':'تم إيقاف الكاميرا 📷','info');
}

function toggleMic(){
  isMicOn=!isMicOn;
  document.getElementById('micToggleBtn').classList.toggle('active',isMicOn);
  document.getElementById('micToggleIcon').className=isMicOn?'fas fa-microphone':'fas fa-microphone-slash';
  if(isMicOn&&partnerInfo){startTranslation();showNotif('تم تفعيل ترجمة الصوت 🎤','success');}
  else{stopTranslation();isMicOn=false;showNotif('تم إيقاف ترجمة الصوت','info');}
}

function toggleSpeaker(){
  isSpeakerOn=!isSpeakerOn;
  document.getElementById('speakerBtn').classList.toggle('active',!isSpeakerOn);
  document.getElementById('speakerIcon').className=isSpeakerOn?'fas fa-volume-high':'fas fa-volume-xmark';
  if(!isSpeakerOn) window.speechSynthesis.cancel();
  showNotif(isSpeakerOn?'تم تشغيل صوت الترجمة 🔊':'تم إيقاف صوت الترجمة','info');
}

function flipCamera(){
  isFrontCamera=!isFrontCamera;
  if(localStream){localStream.getVideoTracks().forEach(function(t){t.stop();});}
  navigator.mediaDevices.getUserMedia({
    video:{facingMode:isFrontCamera?'user':'environment'},
    audio:{echoCancellation:true,noiseSuppression:true}
  }).then(function(stream){
    var oldAudio=localStream?localStream.getAudioTracks()[0]:null;
    localStream=stream;
    document.getElementById('localVideo').srcObject=stream;
    document.getElementById('localPlaceholder').style.display='none';
    if(peerConnection){
      var vt=stream.getVideoTracks()[0];
      var sender=peerConnection.getSenders().find(function(s){return s.track&&s.track.kind==='video';});
      if(sender&&vt) sender.replaceTrack(vt);
    }
    showNotif(isFrontCamera?'كاميرا أمامية':'كاميرا خلفية','info');
  }).catch(function(e){showNotif('تعذر قلب الكاميرا','error');});
}

// ============================================
// Subtitle Settings
// ============================================
function toggleSubtitleSettings(){
  var p=document.getElementById('subtitleSettings');
  p.classList.toggle('show');
  document.getElementById('subtitleBtn').classList.toggle('active');
}

function setSubtitleMode(mode){
  subtitleMode=mode;
  document.querySelectorAll('#subtitleSettings .stg-btn').forEach(function(b){b.classList.remove('active');});
  var map={both:'showBothBtn',original:'showOrigBtn',translated:'showTransBtn',none:'showNoneBtn'};
  if(map[mode]) document.getElementById(map[mode]).classList.add('active');
}

function changeFontSize(delta){
  subtitleFontSize=Math.max(12,Math.min(26,subtitleFontSize+delta));
  document.getElementById('fontSizeVal').innerText=subtitleFontSize;
  document.querySelectorAll('.subtitle-original,.subtitle-translated').forEach(function(el){el.style.fontSize=subtitleFontSize+'px';});
}

function setSubtitlePos(pos){
  subtitlePos=pos;
  var area=document.getElementById('subtitleArea');
  document.getElementById('posBottomBtn').classList.toggle('active',pos==='bottom');
  document.getElementById('posTopBtn').classList.toggle('active',pos==='top');
  if(pos==='top'){area.style.bottom='auto';area.style.top='80px';}
  else{area.style.top='auto';area.style.bottom='140px';}
}

// ============================================
// Waiting / Partner UI
// ============================================
function showWaiting(){document.getElementById('waitingScreen').classList.remove('hidden');}
function hideWaiting(){document.getElementById('waitingScreen').classList.add('hidden');}

function updatePartnerUI(data){
  document.getElementById('partnerAvatar').innerText=data.name.charAt(0).toUpperCase();
  document.getElementById('partnerName').innerText=data.name;
  document.getElementById('partnerLangDisplay').innerText=(langs[data.language]?langs[data.language].flag:'')+' '+(langs[data.language]?langs[data.language].name:data.language);
  document.getElementById('remoteAvatarBig').innerText=data.name.charAt(0).toUpperCase();
  document.getElementById('remoteNameBig').innerText=data.name;
  document.getElementById('remoteStatus').innerText='متصل';
}

function resetPartnerUI(){
  document.getElementById('partnerAvatar').innerText='؟';
  document.getElementById('partnerName').innerText='في انتظار الشريك...';
  document.getElementById('partnerLangDisplay').innerText='---';
  document.getElementById('remoteAvatarBig').innerText='؟';
  document.getElementById('remoteNameBig').innerText='في انتظار الشريك...';
  document.getElementById('remoteStatus').innerText='جاري الاتصال...';
  document.getElementById('remoteVideo').srcObject=null;
  document.getElementById('remoteVideo').style.display='none';
  document.getElementById('remotePlaceholder').style.display='flex';
}

// ============================================
// Timer
// ============================================
function startTimer(){
  var start=Date.now();
  timerInterval=setInterval(function(){
    callSeconds=Math.floor((Date.now()-start)/1000);
    var m=Math.floor(callSeconds/60),s=callSeconds%60;
    document.getElementById('callTimer').innerText=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
  },1000);
}
function stopTimer(){clearInterval(timerInterval);timerInterval=null;}

// ============================================
// Copy
// ============================================
function copyCallCode(){
  if(!roomId) return;
  navigator.clipboard.writeText(roomId).then(function(){showNotif('تم نسخ الرمز 📋','success');});
}

function copyCallLink(){
  var base=window.location.href.split('?')[0];
  navigator.clipboard.writeText(base+'?join='+roomId).then(function(){showNotif('تم نسخ رابط الدعوة 🔗','success');});
}

// ============================================
// End Call
// ============================================
function confirmEndCall(){if(confirm('هل تريد إنهاء المكالمة؟'))endCall();}

function endCall(){
  stopTranslation();
  stopPeerConnection();
  if(localStream){localStream.getTracks().forEach(function(t){t.stop();});localStream=null;}
  stopTimer();
  window.speechSynthesis.cancel();
  if(socket&&roomId) socket.emit('leave-room',{roomId:roomId});
  document.getElementById('callScreen').classList.remove('active');
  document.getElementById('endCallScreen').classList.add('active');
  var m=Math.floor(callSeconds/60),s=callSeconds%60;
  document.getElementById('endDuration').innerText='المدة: '+(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
  document.getElementById('endMessages').innerText=translationCount;
  document.getElementById('endLang').innerText=(langs[myLang]?langs[myLang].flag:'')+(partnerInfo&&langs[partnerInfo.language]?'→'+langs[partnerInfo.language].flag:'');
  localStorage.removeItem('tcSession');
  roomId=null;partnerInfo=null;
}

function newCall(){
  document.getElementById('endCallScreen').classList.remove('active');
  translationCount=0;callSeconds=0;
  document.getElementById('callTimer').innerText='00:00';
  document.getElementById('callCode').value='';
  document.getElementById('joinCodeGroup').style.display='none';
  document.getElementById('joinCallBtn').style.display='none';
  document.getElementById('preCall').classList.add('active');
  startPreview();
}

// ============================================
// Draggable
// ============================================
function initDraggable(){
  var el=document.getElementById('localFloat');
  var isDragging=false,startX,startY,startRight,startTop;
  el.addEventListener('mousedown',function(e){isDragging=true;startX=e.clientX;startY=e.clientY;var r=el.getBoundingClientRect();startRight=window.innerWidth-r.right;startTop=r.top;el.style.cursor='grabbing';e.preventDefault();});
  el.addEventListener('touchstart',function(e){isDragging=true;var t=e.touches[0];startX=t.clientX;startY=t.clientY;var r=el.getBoundingClientRect();startRight=window.innerWidth-r.right;startTop=r.top;e.preventDefault();},{passive:false});
  document.addEventListener('mousemove',function(e){if(!isDragging)return;var dx=e.clientX-startX,dy=e.clientY-startY;el.style.right=Math.max(10,Math.min(startRight-dx,window.innerWidth-el.offsetWidth-10))+'px';el.style.left='auto';el.style.top=Math.max(10,Math.min(startTop+dy,window.innerHeight-el.offsetHeight-10))+'px';});
  document.addEventListener('touchmove',function(e){if(!isDragging)return;var t=e.touches[0];var dx=t.clientX-startX,dy=t.clientY-startY;el.style.right=Math.max(10,Math.min(startRight-dx,window.innerWidth-el.offsetWidth-10))+'px';el.style.left='auto';el.style.top=Math.max(10,Math.min(startTop+dy,window.innerHeight-el.offsetHeight-10))+'px';e.preventDefault();},{passive:false});
  document.addEventListener('mouseup',function(){isDragging=false;el.style.cursor='grab';});
  document.addEventListener('touchend',function(){isDragging=false;});
}

// ============================================
// Auto Join
// ============================================
function checkAutoJoin(){
  var params=new URLSearchParams(window.location.search);
  var joinCode=params.get('join');
  if(joinCode){
    document.getElementById('callCode').value=joinCode.toUpperCase();
    document.getElementById('joinCodeGroup').style.display='block';
    document.getElementById('joinCallBtn').style.display='block';
    showNotif('رمز المكالمة: '+joinCode,'info');
  }
}

// ============================================
// Notification
// ============================================
function showNotif(msg,type){
  var el=document.getElementById('notif');
  el.innerText=msg;el.className='notif show '+(type||'info');
  setTimeout(function(){el.classList.remove('show');},3500);
}

// ============================================
// ✅ Keep alive on background
// ============================================
document.addEventListener('visibilitychange',function(){
  if(!document.hidden){
    if(partnerInfo&&isMicOn&&!isRecording) startTranslation();
    if(peerConnection&&peerConnection.iceConnectionState==='disconnected'){
      try{peerConnection.restartIce();}catch(e){}
    }
  }
});

// ============================================
// Init
// ============================================
window.onload=function(){
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged=function(){window.speechSynthesis.getVoices();};

  var activated=false;
  function silentActivate(){
    if(activated) return;activated=true;
    try{new(window.AudioContext||window.webkitAudioContext)().resume();}catch(e){}
    var isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
    var isMac=navigator.maxTouchPoints>0&&/Mac/.test(navigator.userAgent);
    if(!isIOS&&!isMac){
      try{window.speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(' ');u.volume=0.01;u.rate=10;window.speechSynthesis.speak(u);}catch(e){}
    }
  }
  document.addEventListener('click',silentActivate);
  document.addEventListener('touchstart',silentActivate);

  if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(){});}

  initDraggable();
  initSocket();
};
</script>
